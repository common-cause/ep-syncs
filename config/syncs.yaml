# Shift volunteers sync — Airtable targets per state.
#
# Each entry pulls from BigQuery view ptv_raw_2026.v_shift_volunteers_current
# (filtered to its state) and upserts into the named Airtable base/table on
# the email field. A single state can appear in multiple entries when there
# are multiple downstream Airtable destinations (primary base, coalition
# partner bases, etc.).

# Default field map: BigQuery view column -> Airtable column name.
# Per-sync `field_map:` blocks merge over (and can override) this default.
#
# Defaults reflect the minimal CC "Shifted Volunteers" base schema (contact
# columns only). Bases that have additional analytics columns (shift counts,
# dates, role, source, last_synced_at) should add them in their own
# field_map. Any field map entry whose Airtable column does not exist on the
# destination table will 422 on upsert -- override per-sync to drop it.
default_field_map:
  email:        Email
  first_name:   First Name
  last_name:    Last Name
  phone_number: Phone Number
  county:       County
  state:        State

# BigQuery-side field used as the Airtable upsert key. Looked up in field_map
# at runtime to find the corresponding Airtable column.
upsert_key_bq: email

syncs:
  - name: NE Primary
    state: NE
    base_id: app4rdMLSJUpT57Ht
    table: Shifted Volunteers
